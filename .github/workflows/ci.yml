name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: make test-ci

      - name: API smoke test
        run: |
          uv run uvicorn app.main:app --port 8000 &
          sleep 3
          curl -sf http://localhost:8000/api/todos/ | python3 -m json.tool
          kill %1
