<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232563EB'/><path d='M9 17l4 4 10-10' stroke='white' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>Todo App</h1>
        </header>
        <main id="app">
            <form id="todo-form" class="todo-form">
                <input
                    type="text"
                    id="todo-input"
                    class="todo-input"
                    placeholder="할 일을 입력하세요"
                    autocomplete="off"
                >
                <button type="submit" class="todo-submit">추가</button>
            </form>
            <div id="todo-list-container">
                <ul id="todo-list" class="todo-list"></ul>
                <p id="empty-state" class="empty-state">오늘 할 일을 적어보세요</p>
                <p id="error-state" class="error-state" hidden>목록을 불러오지 못했습니다</p>
            </div>
        </main>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
